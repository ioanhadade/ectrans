name: build

# Controls when the action will run
on:

  # Trigger the workflow on all pushes, except on tag creation
  push:
    branches:
    - '**'
    tags-ignore:
    - '**'

  # Trigger the workflow on all pull requests
  pull_request: ~

  # Allow workflow to be dispatched on demand
  workflow_dispatch: ~

env:
  ECTRANS_TOOLS: ${{ github.workspace }}/.github/tools
  CTEST_PARALLEL_LEVEL: 1
  CACHE_SUFFIX: v1        # Increase to force new cache to be created

jobs:
  ci:
    name: ci

    strategy:
      fail-fast: false    # false: try to complete all jobs

      matrix:
        build_type: [Release,Debug]
        name:
          - linux gnu-13
          - linux clang-18
          - linux nvhpc-25.11
          - linux intel-classic
          - linux intel-modern
          - macos

        include:

          - name: linux gnu-13
            os: ubuntu-24.04
            compiler: gnu-13
            compiler_cc: gcc-13
            compiler_cxx: g++-13
            compiler_fc: gfortran-13
            cmake_options: -DBLA_VENDOR=Generic
            ctest_options: -E memory
            caching: true

          - name: linux clang-18
            os: ubuntu-24.04
            compiler: clang-18
            compiler_cc: clang-18
            compiler_cxx: clang++-18
            compiler_fc: gfortran-14
            cmake_options: -DBLA_VENDOR=Generic
            ctest_options: -E memory
            caching: true

          - name: linux nvhpc-25.11
            os: ubuntu-24.04
            compiler: nvhpc-25.11
            compiler_cc: nvc
            compiler_cxx: nvc++
            compiler_fc: nvfortran
            cmake_options: -DBLA_VENDOR=Generic
            ctest_options: -E memory
            caching: false

          - name : linux intel-classic
            os: ubuntu-22.04
            compiler: intel-classic
            compiler_cc: icc
            compiler_cxx: icpc
            compiler_fc: ifort
            cmake_options: -DBLA_VENDOR=Generic
            caching: true

          - name : linux intel-modern
            os: ubuntu-24.04
            compiler: intel-modern
            compiler_cc: icx
            compiler_cxx: icpx
            compiler_fc: ifx
            cmake_options: -DCMAKE_Fortran_FLAGS=-heap-arrays -DBLA_VENDOR=Generic
            python-version: '3.11'
            caching: true

          - name: macos
            # Xcode compiler requires empty environment variables, so we pass null (~) here
            os: macos-15
            compiler: clang-17
            compiler_cc: ~
            compiler_cxx: ~
            compiler_fc: gfortran-13
            cmake_options: >-
              -DBLAS_LIBRARIES=/opt/homebrew/opt/lapack/lib/libblas.dylib
              "-DLAPACK_LIBRARIES=/opt/homebrew/opt/lapack/lib/libblas.dylib;/opt/homebrew/opt/lapack/lib/liblapack.dylib"
              -DBLA_VENDOR=Generic
            caching: true

    runs-on: ${{ matrix.os }}
    steps:
    - name: System info
      shell: bash -eux {0}
      run: |
        if [[ "${{ matrix.os }}" =~ macos ]]; then
          system_profiler SPHardwareDataType -detailLevel mini
          sysctl machdep.cpu
        else
          sed '/^$/q' /proc/cpuinfo
        fi

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: 3.11

    - name: Checkout Repository
      uses: actions/checkout@v2

    - name: Environment
      run:  |
        echo "DEPS_DIR=${{ runner.temp }}/deps" >> $GITHUB_ENV
        echo "CC=${{ matrix.compiler_cc }}"     >> $GITHUB_ENV
        echo "CXX=${{ matrix.compiler_cxx }}"   >> $GITHUB_ENV
        echo "FC=${{ matrix.compiler_fc }}"     >> $GITHUB_ENV

        if [[ "${{ matrix.os }}" =~ macos ]]; then
          brew install ninja
        else
          sudo apt-get update
          sudo apt-get install ninja-build
        fi

        printenv

    - name: Cache Dependencies
      # There seems to be a problem with cached NVHPC dependencies, leading to SIGILL perhaps due to slightly different architectures
      if: matrix.caching
      id: deps-cache
      uses: pat-s/always-upload-cache@v2.1.5
      with:
        path: ${{ env.DEPS_DIR }}
        key: deps-${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}-${{ env.CACHE_SUFFIX }}

    # Free up disk space for nvhpc
    - name: Free Disk Space (Ubuntu)
      uses: jlumbroso/free-disk-space@main
      if: contains( matrix.compiler, 'nvhpc' )
      continue-on-error: true
      with:
        # this might remove tools that are actually needed,
        # if set to "true" but frees about 6 GB
        tool-cache: false

        # all of these default to true, but feel free to set to
        # "false" if necessary for your workflow
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: Install NVHPC compiler
      if: contains( matrix.compiler, 'nvhpc' )
      shell: bash -eux {0}
      run: |
        ${ECTRANS_TOOLS}/install-nvhpc.sh --prefix /opt/nvhpc
        source /opt/nvhpc/env.sh
        echo "${NVHPC_DIR}/compilers/bin"                   >> $GITHUB_PATH
        [ -z ${MPI_HOME+x} ] || echo "MPI_HOME=${MPI_HOME}" >> $GITHUB_ENV
    - name: Download Intel compiler
      if: contains( matrix.compiler, 'intel' )
      run: |
        wget https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB
        sudo apt-key add GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB
        rm GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB
        sudo add-apt-repository "deb https://apt.repos.intel.com/oneapi all main"

    - name: Install Intel classic compiler
      if: contains( matrix.compiler, 'intel-classic' )
      run: |
        version=2023.2.0
        sudo apt-get update
        sudo apt-get install \
          intel-oneapi-compiler-fortran-$version \
          intel-oneapi-compiler-dpcpp-cpp-and-cpp-classic-$version
        source /opt/intel/oneapi/setvars.sh
        printenv >> $GITHUB_ENV
        echo "CACHE_SUFFIX=$CC-$($CC -dumpversion)" >> $GITHUB_ENV

    - name: Install Intel modern compiler
      if: contains( matrix.compiler, 'intel-modern' )
      run: |
        sudo apt-get update
        sudo apt-get install intel-oneapi-toolkit
        source /opt/intel/oneapi/setvars.sh
        printenv >> $GITHUB_ENV
        [ -z ${I_MPI_ROOT+x} ] || echo "MPI_HOME=${I_MPI_ROOT}" >> $GITHUB_ENV
        echo "CACHE_SUFFIX=$CC-$($CC -dumpversion)" >> $GITHUB_ENV

    - name: Install MPI
      shell: bash -eux {0}
      run: |
        FCFLAGS=-fPIC CFLAGS=-fPIC FFLAGS=-fPIC ${ECTRANS_TOOLS}/install-mpi.sh --mpi openmpi --prefix  ${DEPS_DIR}/openmpi
        [ -f ${DEPS_DIR}/openmpi/env.sh ] && source ${DEPS_DIR}/openmpi/env.sh
        [ -z ${MPI_HOME+x} ] || echo "MPI_HOME=${MPI_HOME}" >> $GITHUB_ENV

    - name: Install FFTW
      shell: bash -eux {0}
      run: |
        ${ECTRANS_TOOLS}/install-fftw.sh --version 3.3.10 --with-single --prefix ${DEPS_DIR}/fftw
        echo "FFTW_ROOT=${DEPS_DIR}/fftw" >> $GITHUB_ENV

    - name: Install reference BLAS/LAPACK
      shell: bash -eux {0}
      run: ${ECTRANS_TOOLS}/install-ref-blas-lapack.sh

    - name: Set Build & Test Environment
      run: |

        # Add mpirun to path for testing
        [ -z ${MPI_HOME+x} ] || echo "${MPI_HOME}/bin" >> $GITHUB_PATH

        if [[ "${{ matrix.compiler }}" =~ "nvhpc" ]]; then
          # Add a -tp=haswell flag, which is needed to avoid nvfortran errors of "Error during math dispatching processing..."
          # It seems the compiler detects an incompatible target processor on some of the runners,
          # in particular -tp=znver4 seems incompatible with "AMD EPYC 9V74 80-Core Processor" as shown by /proc/cpuinfo
          NVHPC_TARGET_FLAG="-tp=haswell"
          echo "set( ECBUILD_Fortran_FLAGS ${NVHPC_TARGET_FLAG} )" >> $PWD/toolchain.cmake
          echo "set( ECBUILD_C_FLAGS ${NVHPC_TARGET_FLAG} )"       >> $PWD/toolchain.cmake
          echo "set( ECBUILD_CXX_FLAGS ${NVHPC_TARGET_FLAG} )"     >> $PWD/toolchain.cmake

          echo "CMAKE_TOOLCHAIN_FILE=$PWD/toolchain.cmake" >> $GITHUB_ENV
        fi

    - name: Build & Test
      id: build-test
      uses: ecmwf-actions/build-package@v2
      with:
        self_coverage: false
        force_build: true
        cache_suffix: "${{ matrix.build_type }}-${{ env.CACHE_SUFFIX }}"
        recreate_cache: ${{ matrix.caching == false }}
        dependencies: |
          ecmwf/ecbuild
          ecmwf-ifs/fiat
          ecmwf-ifs/field_api@refs/tags/v0.3.9
        dependency_branch: develop
        dependency_cmake_options: |
          ecmwf-ifs/fiat: "-G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DENABLE_TESTS=OFF -DENABLE_MPI=ON"
        cmake_options:    "-G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} ${{ matrix.cmake_options }} -DENABLE_MPI=ON -DENABLE_FFTW=ON -DENABLE_ETRANS=ON -DENABLE_MKL=OFF -DENABLE_FIELD_API=ON"
        ctest_options: "${{ matrix.ctest_options }}"

    - name: Verify tools
      run: |
        export PATH=${{ steps.build-test.outputs.bin_path }}:$PATH

        echo "+ ectrans --info"
        ectrans --info

